<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' http://127.0.0.1:54321 ws://127.0.0.1:54321 http://localhost:54321 ws://localhost:54321 https://vusgsdcozkaumyudqhlu.supabase.co wss://vusgsdcozkaumyudqhlu.supabase.co https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Project Tracker - Login</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
        :root {
            --login-bg: radial-gradient(900px 520px at 0% 0%, rgba(37, 99, 235, 0.10), transparent 55%), radial-gradient(900px 520px at 100% 0%, rgba(99, 102, 241, 0.10), transparent 55%), linear-gradient(180deg, #f8fafc 0%, #eef4ff 100%);
            --panel-bg: rgba(255, 255, 255, 0.88);
            --panel-border: rgba(15, 23, 42, 0.10);
            --panel-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            --hero-bg: linear-gradient(180deg, rgba(255,255,255,0.75), rgba(248,250,252,0.92));
            --text-strong: #0f172a;
            --text-body: #1e293b;
            --text-muted: #64748b;
            --line-soft: rgba(15, 23, 42, 0.08);
            --line-mid: rgba(15, 23, 42, 0.14);
            --primary-strong: #0f172a;
            --primary-hover: #1e293b;
            --ring: 0 0 0 4px rgba(59, 130, 246, 0.12);
            --success-bg: #ecfdf5;
            --success-border: #a7f3d0;
            --success-text: #065f46;
            --error-bg: #fff1f2;
            --error-border: #fecdd3;
            --error-text: #b91c1c;
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 14px;
            --input-h: 52px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
            color: var(--text-body);
            background: var(--login-bg);
        }

        .auth-wrap {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 28px;
        }

        .login-shell {
            width: min(1140px, 100%);
        }

        .login-card {
            display: grid;
            grid-template-columns: minmax(0, 1.1fr) minmax(420px, 0.9fr);
            min-height: 720px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--panel-shadow);
            overflow: hidden;
            backdrop-filter: blur(14px);
        }

        .login-hero {
            position: relative;
            padding: 42px 40px;
            background: var(--hero-bg);
            border-right: 1px solid var(--line-soft);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 28px;
        }

        .hero-top {
            max-width: 620px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 38px;
            padding: 0 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line-soft);
            color: var(--text-body);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .hero-title {
            margin: 22px 0 0;
            font-size: clamp(40px, 5vw, 64px);
            line-height: 0.98;
            letter-spacing: -0.05em;
            font-weight: 800;
            color: var(--text-strong);
            max-width: 620px;
        }

        .hero-text {
            margin: 18px 0 0;
            max-width: 560px;
            font-size: 16px;
            line-height: 1.75;
            color: var(--text-muted);
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            max-width: 620px;
        }

        .hero-point {
            background: rgba(255, 255, 255, 0.78);
            border: 1px solid var(--line-soft);
            border-radius: 20px;
            padding: 18px 18px 16px;
            box-shadow: 0 10px 28px rgba(15, 23, 42, 0.05);
        }

            .hero-point strong {
                display: block;
                margin-bottom: 6px;
                font-size: 14px;
                font-weight: 800;
                color: var(--text-strong);
            }

            .hero-point span {
                display: block;
                font-size: 14px;
                line-height: 1.6;
                color: var(--text-muted);
            }

        .auth-panel {
            padding: 42px 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.82);
        }

        .auth-panel-inner {
            width: min(420px, 100%);
        }

        .panel-head {
            margin-bottom: 26px;
        }

        .panel-kicker {
            margin: 0 0 10px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
            color: #3b82f6;
        }

        .panel-title {
            margin: 0;
            font-size: 34px;
            line-height: 1.05;
            letter-spacing: -0.04em;
            font-weight: 800;
            color: var(--text-strong);
        }

        .panel-subtitle {
            margin: 12px 0 0;
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-muted);
        }

        .auth-form {
            margin-top: 8px;
        }

        .field {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-body);
        }

        .input {
            width: 100%;
            height: var(--input-h);
            padding: 0 16px;
            border-radius: 16px;
            border: 1px solid var(--line-mid);
            background: rgba(255, 255, 255, 0.94);
            color: var(--text-strong);
            font: inherit;
            outline: none;
            transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
        }

            .input::placeholder {
                color: #94a3b8;
            }

            .input:focus {
                border-color: #60a5fa;
                box-shadow: var(--ring);
                background: #ffffff;
            }

        .password-wrap {
            position: relative;
        }

            .password-wrap .input {
                padding-right: 54px;
            }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: #64748b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .16s ease, color .16s ease;
        }

            .password-toggle:hover {
                background: rgba(15, 23, 42, 0.06);
                color: var(--text-body);
            }

            .password-toggle:focus {
                outline: none;
                box-shadow: var(--ring);
            }

            .password-toggle svg {
                width: 18px;
                height: 18px;
                stroke: currentColor;
            }

        .forgot-row {
            margin-top: 10px;
            display: flex;
            justify-content: flex-end;
        }

        .forgot-link {
            border: 0;
            background: transparent;
            padding: 0;
            color: #2563eb;
            font: inherit;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

            .forgot-link:hover {
                color: #1d4ed8;
                text-decoration: underline;
            }

        .btn {
            appearance: none;
            border: 0;
            cursor: pointer;
            font: inherit;
        }

        .btn-primary {
            width: 100%;
            height: 54px;
            margin-top: 8px;
            border-radius: 999px;
            background: var(--primary-strong);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.01em;
            transition: transform .08s ease, background .16s ease, box-shadow .16s ease;
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.16);
        }

            .btn-primary:hover {
                background: var(--primary-hover);
            }

            .btn-primary:active {
                transform: translateY(1px);
            }

            .btn-primary:disabled {
                opacity: 0.65;
                cursor: wait;
                transform: none;
            }

        #msg {
            display: none;
            margin-top: 14px;
            border-radius: 14px;
            padding: 12px 14px;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid var(--line-soft);
            background: rgba(15, 23, 42, 0.03);
            color: var(--text-body);
        }

            #msg.is-error {
                display: block;
                background: var(--error-bg);
                border-color: var(--error-border);
                color: var(--error-text);
            }

            #msg.is-success {
                display: block;
                background: var(--success-bg);
                border-color: var(--success-border);
                color: var(--success-text);
            }

        .panel-foot {
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--line-soft);
            font-size: 13px;
            line-height: 1.7;
            color: var(--text-muted);
        }

        @media (max-width: 980px) {
            .login-card {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .login-hero {
                border-right: 0;
                border-bottom: 1px solid var(--line-soft);
                padding: 30px 28px;
            }

            .auth-panel {
                padding: 32px 28px;
            }

            .hero-title {
                max-width: none;
            }
        }

        @media (max-width: 640px) {
            .auth-wrap {
                padding: 16px;
            }

            .login-hero,
            .auth-panel {
                padding: 22px 20px;
            }

            .panel-title {
                font-size: 30px;
            }

            .hero-point {
                padding: 16px;
            }
        }
    </style>
</head>

<body>
    <main class="auth-wrap">
        <section class="login-shell">
            <div class="login-card">
                <section class="login-hero">
                    <div class="hero-top">
                        <div class="eyebrow">Project Tracker Workspace</div>
                        <h1 class="hero-title">Project Tracker.</h1>
                        <p class="hero-text">
                            Access dashboards, update candidate status, and manage project tickets in one place with role-based access.
                        </p>
                    </div>

                </section>

                <section class="auth-panel">
                    <div class="auth-panel-inner">
                        <div class="panel-head">
                            <p class="panel-kicker">Welcome back</p>
                            <h2 class="panel-title">Sign in</h2>
                            <p class="panel-subtitle">Enter your account details to continue.</p>
                        </div>

                        <div class="auth-form">
                            <div class="field">
                                <label class="label" for="email">Email</label>
                                <input id="email" class="input" type="email" placeholder="name@company.com" autocomplete="email" />
                            </div>

                            <div class="field">
                                <label class="label" for="password">Password</label>
                                <div class="password-wrap">
                                    <input id="password" class="input" type="password" placeholder="Enter your password" autocomplete="current-password" />
                                    <button id="togglePasswordBtn" class="password-toggle" type="button" aria-label="Show password" aria-pressed="false">
                                        <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                                            <circle cx="12" cy="12" r="3"></circle>
                                        </svg>
                                    </button>
                                </div>
                                <div class="forgot-row">
                                    <button id="forgotPasswordBtn" class="forgot-link" type="button">Forgot password?</button>
                                </div>
                            </div>

                            <button id="btn" class="btn btn-primary" type="button">Sign in</button>

                            <div id="msg"></div>

                            <div class="panel-foot">
                                If you do not have an account yet, please contact your administrator.
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        </section>
    </main>

    <script type="module">
        import { supabase } from "./supabaseClient.js";

        const emailEl = document.getElementById("email");
        const pwEl = document.getElementById("password");
        const msgEl = document.getElementById("msg");
        const forgotPasswordBtn = document.getElementById("forgotPasswordBtn");
        const signInBtn = document.getElementById("btn");
        const togglePasswordBtn = document.getElementById("togglePasswordBtn");

        let passwordVisible = false;

        function showMsg(text, isError = true) {
            msgEl.style.display = "block";
            msgEl.className = isError ? "is-error" : "is-success";
            msgEl.textContent = text;
        }

        function hideMsg() {
            msgEl.style.display = "none";
            msgEl.className = "";
            msgEl.textContent = "";
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function setLoading(loading) {
            signInBtn.disabled = loading;
            signInBtn.textContent = loading ? "Signing in..." : "Sign in";
        }

        function renderEyeIcon(visible) {
            togglePasswordBtn.innerHTML = visible
                ? `
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M3 3l18 18"></path>
                            <path d="M10.58 10.58A2 2 0 0 0 12 14a2 2 0 0 0 1.42-.58"></path>
                            <path d="M9.88 5.09A9.77 9.77 0 0 1 12 5c6.5 0 10 7 10 7a17.73 17.73 0 0 1-4.11 5.06"></path>
                            <path d="M6.61 6.61A17.35 17.35 0 0 0 2 12s3.5 7 10 7a9.77 9.77 0 0 0 2.12-.09"></path>
                        </svg>
                    `
                : `
                        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    `;
        }

        function setPasswordVisibility(visible) {
            passwordVisible = visible;
            pwEl.type = visible ? "text" : "password";
            togglePasswordBtn.setAttribute("aria-label", visible ? "Hide password" : "Show password");
            togglePasswordBtn.setAttribute("aria-pressed", visible ? "true" : "false");
            renderEyeIcon(visible);
        }

        async function redirectLoggedInUser(session) {
            if (!session?.user?.id) return false;

            const { data: profile, error } = await supabase
                .from("profiles")
                .select("role")
                .eq("id", session.user.id)
                .maybeSingle();

            if (error) return false;

            if (profile?.role === "candidate") {
                window.location.replace("./candidate-status.html");
                return true;
            }

            window.location.replace("./projects.html");
            return true;
        }

        async function signIn() {
            hideMsg();

            const email = String(emailEl.value || "").trim();
            const password = String(pwEl.value || "");

            if (!email || !password) {
                showMsg("Please enter both email and password.");
                return;
            }

            if (!isValidEmail(email)) {
                showMsg("Please enter a valid email address.");
                return;
            }

            setLoading(true);

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    showMsg(error.message || "Sign in failed.");
                    return;
                }

                const redirected = await redirectLoggedInUser(data?.session);
                if (!redirected) {
                    window.location.replace("./projects.html");
                }
            } catch (err) {
                showMsg(String(err?.message || err || "Sign in failed."));
            } finally {
                setLoading(false);
            }
        }

        async function sendResetPassword() {
            hideMsg();

            const email = String(emailEl.value || "").trim();

            if (!email) {
                showMsg("Enter your email first, then try again.");
                emailEl.focus();
                return;
            }

            if (!isValidEmail(email)) {
                showMsg("Please enter a valid email address.");
                emailEl.focus();
                return;
            }

            forgotPasswordBtn.disabled = true;

            try {
                const redirectTo = new URL("./update-password.html", window.location.href).toString();

                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo
                });

                if (error) {
                    showMsg(error.message || "Could not send reset password email.");
                    return;
                }

                showMsg("Password reset email sent. Please check your inbox.", false);
            } catch (err) {
                showMsg(String(err?.message || err || "Could not send reset password email."));
            } finally {
                forgotPasswordBtn.disabled = false;
            }
        }

        const pageUrl = new URL(window.location.href);
        const pageMsg = pageUrl.searchParams.get("msg");

        if (pageMsg === "password_updated") {
            showMsg("Password updated successfully. Please sign in with your new password.", false);
            pageUrl.searchParams.delete("msg");
            window.history.replaceState({}, document.title, pageUrl.pathname);
        }

        setPasswordVisibility(false);

        togglePasswordBtn.addEventListener("click", () => {
            setPasswordVisibility(!passwordVisible);
        });

        signInBtn.addEventListener("click", signIn);
        forgotPasswordBtn.addEventListener("click", sendResetPassword);

        emailEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") signIn();
        });

        pwEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter") signIn();
        });

        const { data: sessionData } = await supabase.auth.getSession();
        await redirectLoggedInUser(sessionData?.session);
    </script>
</body>
</html>
