        .wrap {
            max-width: 1240px;
            margin: 0 auto;

        .card {
            background: rgba(255, 255, 255, 0.82);

        }

        .toolbar {

        .input,
        .select,

            width: 100%;

        }

        .textarea {

            line-height: 1.4;
        }

            .input:disabled,

            }

        .table-wrap {

        th,

    <script type="module">
        import { supabase } from "./supabaseClient.js";
        import { normalizeStatus, normalizePriority } from "./lib/ticket-utils.js";
        import { attachTicketNavBadge, isTicketUnreadForUser } from "./lib/ticket-nav-badge.js";

        const el = (id) => document.getElementById(id);
        const pageSkeleton = el("pageSkeleton");

        function hidePageSkeleton() {
            if (pageSkeleton) pageSkeleton.hidden = true;
            document.body.classList.remove("is-page-loading");
        }

        const tbody = el("tbody");
        const msg = el("msg");
        const searchInput = el("searchInput");
        const statusFilter = el("statusFilter");
        const priorityFilter = el("priorityFilter");
        const editModeNote = el("editModeNote");

        let PROJECT_CTX = null;
        let ALL_ITEMS = [];
        let REPLIES_BY_TICKET = new Map();
        let READ_STATE_BY_TICKET = new Map();
        let NAME_BY_USER_ID = new Map();
        let OWNER_OPTIONS = [];
        let SESSION_USER_ID = null;
        let SESSION_JWT = null;
        let PROFILE_ROLE = null;
        let DISPLAY_NAME = "";
        let CAN_EDIT = false;
        let IS_CLIENT = false;
        let ticketNavBadge = null;

        function isTicketUnread(ticket) {
            return isTicketUnreadForUser({
                ticket,
                replies: REPLIES_BY_TICKET.get(String(ticket?.id || "")) || [],
                lastReadAt: READ_STATE_BY_TICKET.get(String(ticket?.id || "")) || 0,
                userId: SESSION_USER_ID,
            });
        }

        async function markTicketSeen(ticketId) {
            const id = String(ticketId || "").trim();
            if (!id || !SESSION_USER_ID) return false;

            const nowIso = new Date().toISOString();
            const { error } = await supabase
                .from("ticket_read_states")
                .upsert({
                    user_id: SESSION_USER_ID,
                    ticket_id: id,
                    last_read_at: nowIso,
                    updated_at: nowIso,
                }, { onConflict: "user_id,ticket_id" });

            if (error) {
                console.warn("markTicketSeen failed:", error.message);
                return false;
            }

            READ_STATE_BY_TICKET.set(id, Date.parse(nowIso) || Date.now());
            await ticketNavBadge?.refresh?.();
            return true;
        }

        function showMsg(text, isError = false) {
            msg.className = "msg show " + (isError ? "error" : "ok");
            msg.textContent = text;
        }

        function clearMsg() {
            msg.className = "msg";
            msg.textContent = "";
        }

        function escapeHtml(s) {
            return String(s ?? "")
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function formatDate(v) {
            if (!v) return "-";
            const d = new Date(v);
            if (Number.isNaN(d.getTime())) return String(v);
            return d.toLocaleString();
        }

        // normalizeStatus and normalizePriority imported from ./lib/ticket-utils.js

        function getStatusPillClass(status) {
            return status === "done" ? "pill pill-done" : "pill pill-open";
        }

        async function requireSession() {
            const { data } = await supabase.auth.getSession();
            const session = data?.session;

            if (!session) {
                window.location.replace("./index.html");
                return null;
            }

            supabase.auth.onAuthStateChange((_evt, s) => {
                if (!s) window.location.replace("./index.html");
            });

            return session;
        }

        async function loadMyProfileRole(userId) {
            const { data, error } = await supabase
                .from("profiles")
                .select("role, display_name")
                .eq("id", userId)
                .maybeSingle();

            if (error) {
                console.error("profiles role query failed:", error);
                return null;
            }

            return {
                role: String(data?.role || "").trim().toLowerCase() || null,
                displayName: data?.display_name || "",
            };

        async function resolveProjectForUser(userId) {
            const { data: mem, error } = await supabase
                .from("project_members")
                .select("project_id, role, projects(name)")
                .eq("user_id", userId);

            if (error) throw error;
            if (!mem || mem.length === 0) throw new Error("No project membership found.");

            const url = new URL(window.location.href);
            const projectParam = url.searchParams.get("project");
            const storedProjectId = sessionStorage.getItem("selected_project_id");
            const wantedId = String(projectParam || storedProjectId || "").trim();

            if (wantedId) {
                const hit = mem.find((m) => String(m.project_id) === wantedId);
                if (hit) {
                    sessionStorage.setItem("selected_project_id", String(hit.project_id));
                    return {
                        project_id: hit.project_id,
                        project_name: hit.projects?.name || "Project",
                        member_role: hit.role || "viewer"
                    };
                }
            }

            const first = mem[0];
            return {
                project_id: first.project_id,
                project_name: first.projects?.name || "Project",
                member_role: first.role || "viewer"
            };
        }

        async function loadDisplayNameMap(userIds) {
            const ids = Array.from(new Set((userIds || []).filter(Boolean).map(String)));

            if (ids.length === 0) return new Map();

            const { data, error } = await supabase
                .from("profiles")
                .select("id, display_name")
                .in("id", ids);

            if (error) {
                console.error("profiles display_name query failed:", error);
                return new Map();
            }

            const map = new Map();
            for (const row of (data || [])) {
                const id = String(row.id || "");
                const name = String(row.display_name || "").trim();
                map.set(id, name || id);
            }

            return map;
        }

        async function loadOwnerOptions(projectId) {
            const { data: members, error } = await supabase
                .from("project_members")
                .select("user_id, role")
                .eq("project_id", projectId);

            if (error) {
                console.error("project_members owner query failed:", error);
                return [];
            }

            const ids = Array.from(new Set((members || []).map((m) => String(m.user_id || "")).filter(Boolean)));
            const nameMap = await loadDisplayNameMap(ids);

            return ids.map((id) => {
                const member = (members || []).find((m) => String(m.user_id) === id);
                const role = String(member?.role || "").trim().toLowerCase();
                const label = nameMap.get(id) || id;

                return {
                    user_id: id,
                    label: role ? `${label} (${role})` : label
                };
            });
        }

        function buildOwnerOptionsHtml(selectedValue) {
            const current = String(selectedValue || "");
            const options = [
                `<option value="">Unassigned</option>`,
                ...OWNER_OPTIONS.map((opt) => {
                    const selected = current === String(opt.user_id) ? "selected" : "";
                    return `<option value="${escapeHtml(opt.user_id)}" ${selected}>${escapeHtml(opt.label)}</option>`;

        function getDisplayName(userId) {

        function buildRepliesHtml(ticketId, legacyReply, legacyRepliedBy, legacyRepliedAt) {
            const replies = REPLIES_BY_TICKET.get(String(ticketId)) || [];

            // Show legacy reply_message as first entry if it exists and there are no new replies
            const items = [];
            if (legacyReply && replies.length === 0) {
                items.push({
                    author_id: legacyRepliedBy,
                    author_role: "internal",
                    message: legacyReply,
                    created_at: legacyRepliedAt,
                    legacy: true,
                });
            }
            items.push(...replies);

            if (items.length === 0) {
                return `<div class="reply-empty muted small">No replies yet.</div>`;
            }

            return items.map((r) => {
                const name = String(r.author_name || "").trim()
                    || NAME_BY_USER_ID.get(String(r.author_id || ""))
                    || (r.legacy ? "Staff" : "Unknown");
                const role = String(r.author_role || "");
                const isStaff = role === "admin" || role === "internal" || role === "staff";
                const cls = isStaff ? "reply-staff" : "reply-client";
                return `
                  <div class="reply-item ${cls}">
                    <div class="reply-meta-header">
                      <span class="reply-author-name">${escapeHtml(name)}</span>
                      <span class="reply-author-role">${escapeHtml(role || "staff")}</span>
                      <span class="reply-time">${escapeHtml(formatDate(r.created_at))}</span>
                    </div>
                    <div class="reply-body">${escapeHtml(r.message)}</div>
                  </div>`;
            }).join("");
        }

        async function notifyViaEdge(payload) {
            try {
                const { data, error } = await supabase.functions.invoke("ticket-notify", { body: payload });
                if (error) throw error;
                if (data?.skipped || data?.ok === false) {
                    throw new Error(data?.reason || "notification skipped");
                }
                return { ok: true, data };
            } catch (e) {
                console.warn("Email notification failed (non-fatal):", e);
                return { ok: false, error: e };
            }
        }

        async function submitReply(ticketId, message, replyInput, submitBtn) {
            submitBtn.disabled = true;
            submitBtn.textContent = "Sending...";
            try {
                const { data: reply, error } = await supabase
                    .from("ticket_replies")
                    .insert({
                        ticket_id: ticketId,
                        author_id: SESSION_USER_ID,
                        author_role: PROFILE_ROLE || "viewer",
                        author_name: DISPLAY_NAME,
                        message: message.trim(),
                    })
                    .select()
                    .single();
                if (error) throw new Error(error.message);

                // Add to local map
                if (!REPLIES_BY_TICKET.has(String(ticketId))) {
                    REPLIES_BY_TICKET.set(String(ticketId), []);
                }
                REPLIES_BY_TICKET.get(String(ticketId)).push(reply);
                NAME_BY_USER_ID.set(String(SESSION_USER_ID), DISPLAY_NAME);

                replyInput.value = "";
                showMsg("Reply sent.");
                const _expR = getExpandedIds();
                render();
                restoreExpanded(_expR);
                await markTicketSeen(ticketId);

                // Scroll reply thread to bottom
                const _detailTr = tbody.querySelector(`.ticket-detail-row[data-id="${ticketId}"]`);
                const _thread = _detailTr?.querySelector(".reply-thread");
                if (_thread) _thread.scrollTop = _thread.scrollHeight;

                // Find the ticket for notification context
                const ticket = ALL_ITEMS.find((t) => String(t.id) === String(ticketId));
                const notifyResult = await notifyViaEdge({
                    ticketId: String(ticketId),
                    eventType: "reply",
                    authorId: SESSION_USER_ID,
                    authorName: DISPLAY_NAME,
                    authorRole: PROFILE_ROLE || "viewer",
                    message: message.trim(),
                    ticketSubject: ticket?.subject || "",
                    participantName: ticket?.participant_name || "",
                    projectName: PROJECT_CTX?.project_name || "",
                    projectId: PROJECT_CTX?.project_id || "",
                });
                if (!notifyResult.ok) showMsg("Reply saved, but email notification failed. Please check notification settings.", true);
            } catch (e) {
                showMsg("Failed to send reply: " + e.message, true);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Reply";
            }
        }

        function syncReadStyles(ticketId) {
            const summaryTr = tbody.querySelector(`.ticket-row[data-id="${ticketId}"]`);
            if (!summaryTr) return;

            const item = ALL_ITEMS.find((row) => String(row.id) === String(ticketId));

            summaryTr.classList.toggle("is-unread", isUnread);

            const codeCell = summaryTr.querySelector(".code-cell");
            const chevron = codeCell?.querySelector(".expand-chevron");
            const existingDot = codeCell?.querySelector(".unread-dot");
            if (isUnread && codeCell && chevron && !existingDot) {
                const dot = document.createElement("span");
                dot.className = "unread-dot";
                dot.setAttribute("aria-hidden", "true");

                existingDot.remove();

                });
            }

            // เน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธ Save buttons (in detail row) เน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธ
            for (const btn of tbody.querySelectorAll(".row-save")) {
                btn.addEventListener("click", async () => {
                    const detailTr = btn.closest(".ticket-detail-row");
                    if (!detailTr) return;

                    const requestId = String(detailTr.dataset.id || "");
                    if (!requestId) return;

                    const statusEl   = detailTr.querySelector(".row-status");
                    const priorityEl = detailTr.querySelector(".row-priority");
                    const ownerEl    = detailTr.querySelector(".row-owner");

                    const newStatus       = normalizeStatus(statusEl?.value);
                    const newPriority     = normalizePriority(priorityEl?.value);
                    const newOwnerUserId  = ownerEl ? (String(ownerEl.value || "").trim() || null) : undefined;

                    btn.disabled = true;
                    btn.textContent = "Saving...";

                    try {
                        const idx = ALL_ITEMS.findIndex((x) => String(x.id) === requestId);
                        const oldItem     = idx >= 0 ? ALL_ITEMS[idx] : null;
                        const oldStatus   = oldItem ? normalizeStatus(oldItem.status) : null;
                        const oldPriority = oldItem ? normalizePriority(oldItem.priority) : null;

                        // Build RPC params เน€เธยเนยเธเนโฌย column-level enforcement happens server-side
                        const rpcParams = {
                            p_ticket_id: requestId,
                            p_priority:  newPriority,
                        };
                        if (!IS_CLIENT) {
                            rpcParams.p_status = newStatus;
                            if (newOwnerUserId !== undefined) {
                                rpcParams.p_owner_user_id = newOwnerUserId ?? null;
                                rpcParams.p_set_owner     = true;
                            }
                        }

                        const { error: rpcError } = await supabase.rpc("update_ticket", rpcParams);
                        if (rpcError) throw new Error(rpcError.message);

                        // Re-fetch the updated row
                        const { data, error: fetchError } = await supabase
                            .from("requests")
                            .select("id, project_id, record_id, code, participant_name, subject, message, created_by, created_at, status, priority, owner_user_id, reply_message, replied_at, replied_by, updated_at")
                            .eq("id", requestId)
                            .single();
                        if (fetchError) throw new Error(fetchError.message);
                        if (idx >= 0) ALL_ITEMS[idx] = data;

                        if (!IS_CLIENT) {
                            NAME_BY_USER_ID = await loadDisplayNameMap([
                                ...ALL_ITEMS.map((r) => r.created_by),
                                ...ALL_ITEMS.map((r) => r.owner_user_id),
                            ]);
                        }

                        showMsg("Ticket saved.");
                        await markTicketSeen(requestId);

                        // Fire status_change / priority_change notifications
                        const savedTicket = idx >= 0 ? ALL_ITEMS[idx] : null;
                        if (savedTicket) {
                            const notifyBase = {
                                ticketId:      requestId,
                                authorId:      SESSION_USER_ID,
                                authorName:    DISPLAY_NAME,
                                authorRole:    PROFILE_ROLE || "viewer",
                                ticketSubject: savedTicket.subject || "",
                                participantName: savedTicket.participant_name || "",
                                projectName:   PROJECT_CTX?.project_name || "",
                                projectId:     savedTicket.project_id || "",
                            };
                            if (!IS_CLIENT && oldStatus && newStatus && oldStatus !== newStatus) {
                                await notifyViaEdge({ ...notifyBase, eventType: "status_change",
                                    message: `Status changed from ${oldStatus} to ${newStatus}` });
                            }
                            if (oldPriority && newPriority && oldPriority !== newPriority) {
                                await notifyViaEdge({ ...notifyBase, eventType: "priority_change",
                                    message: `Priority changed from ${oldPriority} to ${newPriority}` });
                            }
                        }

                        const _exp = getExpandedIds();
                        render();
                        restoreExpanded(_exp);
                    } catch (e) {
                        console.error(e);
                        showMsg(`Failed to save: ${e.message}`, true);
                    } finally {
                        btn.disabled = false;
                        btn.textContent = "Save";
                    }
                });
            }

            // เน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธ Reply submit buttons เน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธเน€เธยเนโฌยเนยเธ
            for (const btn of tbody.querySelectorAll(".reply-submit")) {
                btn.addEventListener("click", async () => {
                    const detailTr = btn.closest(".ticket-detail-row");
                    if (!detailTr) return;
                    const ticketId = String(detailTr.dataset.id || "");
                    if (!ticketId) return;
                    const replyInput = detailTr.querySelector(".new-reply-input");
                    const message = String(replyInput?.value || "").trim();
                    if (!message) { showMsg("Reply message cannot be empty.", true); return; }
                    await submitReply(ticketId, message, replyInput, btn);
                });
            }
        }

        async function loadTickets() {
            clearMsg();

            showMsg(`Loading tickets for project: ${PROJECT_CTX.project_id}`);

            try {
                const { data, error } = await supabase
                    .from("requests")
                    .select("id, project_id, record_id, code, participant_name, subject, message, created_by, created_at, status, priority, owner_user_id, reply_message, replied_at, replied_by, updated_at")
                    .eq("project_id", PROJECT_CTX.project_id)
                    .order("created_at", { ascending: false });

                if (error) throw new Error(`requests select failed: ${error.message}`);

                ALL_ITEMS = Array.isArray(data) ? data : [];

                // Load reply threads
                REPLIES_BY_TICKET.clear();
                READ_STATE_BY_TICKET.clear();
                const ticketIds = ALL_ITEMS.map((r) => r.id).filter(Boolean);
                if (ticketIds.length > 0) {
                    const { data: replies } = await supabase
                        .from("ticket_replies")
                        .select("id, ticket_id, author_id, author_name, author_role, message, created_at")
                        .in("ticket_id", ticketIds)
                        .order("created_at", { ascending: true });

                    for (const reply of (replies || [])) {
                        const key = String(reply.ticket_id);
                        if (!REPLIES_BY_TICKET.has(key)) REPLIES_BY_TICKET.set(key, []);
                        REPLIES_BY_TICKET.get(key).push(reply);
                    }

                    const { data: readStates, error: readStatesError } = await supabase
                        .from("ticket_read_states")
                        .select("ticket_id, last_read_at")
                        .eq("user_id", SESSION_USER_ID)
                        .in("ticket_id", ticketIds);
                    if (readStatesError) {
                        console.warn("ticket_read_states select failed:", readStatesError.message);
                    } else {
                        for (const state of (readStates || [])) {
                            READ_STATE_BY_TICKET.set(
                                String(state.ticket_id || ""),
                                Date.parse(state.last_read_at || "") || 0
                            );
                        }
                    }
                }

                const replyAuthorIds = [];
                for (const list of REPLIES_BY_TICKET.values()) {
                    for (const r of list) replyAuthorIds.push(r.author_id);
                }

                const idsToResolve = [
                    ...ALL_ITEMS.map((r) => r.created_by),
                    ...ALL_ITEMS.map((r) => r.owner_user_id),
                    ...ALL_ITEMS.map((r) => r.replied_by),
                    ...replyAuthorIds,
                ];

                NAME_BY_USER_ID = await loadDisplayNameMap(idsToResolve);

                showMsg(`Loaded ${ALL_ITEMS.length} ticket(s) for project: ${PROJECT_CTX.project_id}`);
                render();
                await ticketNavBadge?.refresh?.();
            } finally {
                hidePageSkeleton();
            }
        }

        const session = await requireSession();
        if (!session) throw new Error("No session");

        SESSION_USER_ID = session.user.id;
        SESSION_JWT = session.access_token;

        const _profileData = await loadMyProfileRole(SESSION_USER_ID);
        PROFILE_ROLE = _profileData?.role || null;
        DISPLAY_NAME = _profileData?.displayName || session.user.email || session.user.id;

        const _chipName = DISPLAY_NAME;
        const _chip = el("userChip");
        if (_chip) _chip.textContent = `${_chipName} (${PROFILE_ROLE || "viewer"})`;

        // Hide restricted nav items by default, then show based on role (prevents flash)
        (function applyRoleNavVisibility() {
            const isAdmin = PROFILE_ROLE === "admin";
            const isInternal = PROFILE_ROLE === "internal";

            const canSeeUpdateStatus = isAdmin || isInternal; // internal/admin
            const canSeeAdmin = isAdmin; // admin only

            const navForm = document.getElementById("navUpdateStatus");
            if (navForm) navForm.style.display = canSeeUpdateStatus ? "" : "none";

            const navSettings = document.getElementById("navProjectSettings");
            if (navSettings) navSettings.style.display = canSeeUpdateStatus ? "" : "none";

            const navAdmin = document.getElementById("navAdmin");
            if (navAdmin) navAdmin.style.display = canSeeAdmin ? "" : "none";
        })();

        PROJECT_CTX = await resolveProjectForUser(SESSION_USER_ID);
        ticketNavBadge = attachTicketNavBadge({
            supabase,
            navElement: document.getElementById("navTickets"),
            getProjectId: () => PROJECT_CTX?.project_id || sessionStorage.getItem("selected_project_id") || "",
            userId: SESSION_USER_ID,
            displayMode: "unread_only",
        });
        await ticketNavBadge.refresh();

        CAN_EDIT   = PROFILE_ROLE === "admin" || String(PROJECT_CTX.member_role || "").toLowerCase() === "editor";
        IS_CLIENT  = PROFILE_ROLE === "client";

        // Hide Owner column for client role
        const thOwner = el("thOwner");
        if (thOwner && IS_CLIENT) thOwner.style.display = "none";

        el("projectName").textContent = `${PROJECT_CTX.project_name} (${PROJECT_CTX.member_role})`;
        document.title = `Tickets - ${PROJECT_CTX.project_name}`;


        if (CAN_EDIT) {
            editModeNote.textContent = "Edit mode enabled for admin/editor.";
        } else if (IS_CLIENT) {
            editModeNote.textContent = "You can update priority and reply to tickets.";
        } else {
            editModeNote.textContent = "View only mode. Only admin/editor can update tickets.";
        }

        OWNER_OPTIONS = await loadOwnerOptions(PROJECT_CTX.project_id);

        // Logout (sidebar link)
        el("logoutBtn").addEventListener("click", async () => {
            await supabase.auth.signOut();
            sessionStorage.removeItem("selected_project_id");
            window.location.replace("./index.html");
        });

        // Wire sidebar nav links (keep ?project=...)
        // Force navigation on click (more reliable than relying on href only).
        (function wireSidebarLinks() {
            const pid = encodeURIComponent(PROJECT_CTX.project_id);

            const wire = (id, url) => {
                const a = document.getElementById(id);
                if (!a) return;

                // Set href for normal behavior
                a.setAttribute("href", url);

                // Force navigation (in case href is still "#" or gets overridden)
                a.addEventListener("click", (e) => {
                    e.preventDefault();
                    window.location.href = url;
                });
            };

            wire("navDashboard",    `./dashboard.html?project=${pid}`);
            wire("navTickets",      `./tickets.html?project=${pid}`);
            wire("navUpdateStatus", `./form.html?project=${pid}`);
            wire("navProjectSettings", `./project-settings.html?project=${pid}`);
            wire("navAdmin",        `./admin.html?project=${pid}`);
        })();

        el("refreshBtn").addEventListener("click", async () => {
            try {
                await loadTickets();
                showMsg("Tickets refreshed.");
            } catch (e) {
                showMsg("Failed to load tickets: " + e.message, true);
            }
        });

        searchInput.addEventListener("input", render);
        statusFilter.addEventListener("change", render);
        priorityFilter.addEventListener("change", render);

        try {
            await loadTickets();
            if (ALL_ITEMS.length === 0) showMsg("No tickets yet for this project.");
        } catch (e) {
            console.error(e);
            showMsg("Failed to load tickets: " + e.message, true);
        }
    </script>
</body>
