<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' http://127.0.0.1:55321 ws://127.0.0.1:55321 http://localhost:55321 ws://localhost:55321 https://vusgsdcozkaumyudqhlu.supabase.co wss://vusgsdcozkaumyudqhlu.supabase.co https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Update Password</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
        :root {
            --reset-page-bg: radial-gradient(900px 500px at 0% 0%, rgba(59, 130, 246, 0.16), transparent 55%), radial-gradient(900px 500px at 100% 0%, rgba(99, 102, 241, 0.16), transparent 55%), linear-gradient(180deg, #f8fbff 0%, #f4f7fb 100%);
            --reset-card-bg: rgba(255, 255, 255, 0.96);
            --reset-card-border: rgba(15, 23, 42, 0.08);
            --reset-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
            --reset-text: #0f172a;
            --reset-muted: #64748b;
            --reset-primary: #2563eb;
            --reset-primary-hover: #1d4ed8;
            --reset-input-bg: #ffffff;
            --reset-input-border: #dbe4f0;
            --reset-input-border-focus: rgba(37, 99, 235, 0.45);
            --reset-soft: #eff6ff;
            --reset-success-bg: #ecfdf3;
            --reset-success-text: #166534;
            --reset-success-border: #bbf7d0;
            --reset-error-bg: #fef2f2;
            --reset-error-text: #b91c1c;
            --reset-error-border: #fecaca;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--reset-text);
            background: var(--reset-page-bg);
        }

        .page {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 20px;
        }

        .shell {
            width: min(100%, 560px);
        }

        .card-reset {
            position: relative;
            overflow: hidden;
            background: var(--reset-card-bg);
            border: 1px solid var(--reset-card-border);
            border-radius: 28px;
            box-shadow: var(--reset-shadow);
            backdrop-filter: blur(10px);
            padding: 34px 30px 28px;
        }

            .card-reset::before {
                content: "";
                position: absolute;
                inset: 0 auto auto 0;
                width: 100%;
                height: 5px;
                background: linear-gradient(90deg, #2563eb 0%, #4f46e5 55%, #7c3aed 100%);
            }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 34px;
            padding: 0 14px;
            border-radius: 999px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .title {
            margin: 18px 0 0;
            font-size: clamp(32px, 6vw, 42px);
            line-height: 1.08;
            letter-spacing: -0.04em;
            color: var(--reset-text);
        }

        .subtitle {
            margin: 12px 0 0;
            color: var(--reset-muted);
            font-size: 15px;
            line-height: 1.75;
        }

        .form-area {
            margin-top: 26px;
        }

        .field {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #1e293b;
        }

        .password-wrap {
            position: relative;
        }

        .input {
            width: 100%;
            height: 54px;
            border-radius: 16px;
            border: 1px solid var(--reset-input-border);
            background: var(--reset-input-bg);
            color: var(--reset-text);
            font-size: 15px;
            padding: 0 52px 0 16px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

            .input::placeholder {
                color: #94a3b8;
            }

            .input:focus {
                border-color: var(--reset-input-border-focus);
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
                background: #ffffff;
            }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            border: 1px solid transparent;
            border-radius: 999px;
            background: transparent;
            color: #64748b;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

            .password-toggle:hover {
                background: #f8fafc;
                color: #0f172a;
                border-color: #e2e8f0;
            }

            .password-toggle:focus {
                outline: none;
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            }

        .password-hint {
            margin: 8px 0 0;
            font-size: 13px;
            color: var(--reset-muted);
        }

        .actions {
            margin-top: 18px;
        }

        .submit-btn {
            width: 100%;
            min-height: 54px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--reset-primary) 0%, #4f46e5 100%);
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 0.01em;
            cursor: pointer;
            box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
            transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
        }

            .submit-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 18px 34px rgba(37, 99, 235, 0.28);
            }

            .submit-btn:active {
                transform: translateY(0);
            }

            .submit-btn:disabled {
                cursor: not-allowed;
                opacity: 0.68;
                transform: none;
                box-shadow: none;
            }

        #loadingNote {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-height: 52px;
            width: 100%;
            padding: 0 16px;
            border-radius: 16px;
            border: 1px solid #dbeafe;
            background: #eff6ff;
            color: #1d4ed8;
            font-size: 14px;
            font-weight: 600;
        }

            #loadingNote::before {
                content: "";
                width: 16px;
                height: 16px;
                border-radius: 999px;
                border: 2px solid rgba(37, 99, 235, 0.24);
                border-top-color: rgba(37, 99, 235, 0.9);
                animation: spin 0.8s linear infinite;
            }

        #msg {
            margin-top: 14px;
            display: none;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .msg-error {
            background: var(--reset-error-bg);
            color: var(--reset-error-text);
            border-color: var(--reset-error-border);
        }

        .msg-success {
            background: var(--reset-success-bg);
            color: var(--reset-success-text);
            border-color: var(--reset-success-border);
        }

        .state-note {
            margin-top: 12px;
            min-height: 20px;
            font-size: 13px;
            color: var(--reset-muted);
            line-height: 1.6;
        }

        .back-row {
            margin-top: 18px;
            display: flex;
            justify-content: center;
        }

        .back-link {
            appearance: none;
            border: 0;
            background: transparent;
            color: var(--reset-primary);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 10px;
            transition: background 0.2s ease, color 0.2s ease;
        }

            .back-link:hover {
                background: var(--reset-soft);
                color: var(--reset-primary-hover);
            }

        .is-hidden {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 640px) {
            .page {
                padding: 18px;
            }

            .card-reset {
                padding: 26px 20px 22px;
                border-radius: 22px;
            }

            .title {
                font-size: 30px;
            }

            .subtitle {
                font-size: 14px;
            }

            .input {
                height: 52px;
                border-radius: 14px;
            }

            .submit-btn {
                min-height: 52px;
            }
        }
    </style>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <link rel="manifest" href="favicon/site.webmanifest" />
</head>
<body>
    <main class="page">
        <section class="shell">
            <div class="card-reset">
                <div class="eyebrow">Project Tracker Security</div>

                <h1 class="title">Set a new password</h1>
                <p class="subtitle">
                    Enter your new password below. After the password is updated successfully, you will be redirected to the sign-in page.
                </p>

                <div class="form-area">
                    <div id="loadingNote">Validating your reset link...</div>

                    <div id="formBlock" class="is-hidden">
                        <div class="field">
                            <label class="label" for="newPassword">New Password</label>
                            <div class="password-wrap">
                                <input id="newPassword"
                                       class="input"
                                       type="password"
                                       placeholder="Enter your new password"
                                       autocomplete="new-password" />
                                <button id="toggleNewPasswordBtn"
                                        class="password-toggle"
                                        type="button"
                                        aria-label="Show new password"
                                        aria-pressed="false">
                                    ??
                                </button>
                            </div>
                        </div>

                        <div class="field">
                            <label class="label" for="confirmPassword">Confirm Password</label>
                            <div class="password-wrap">
                                <input id="confirmPassword"
                                       class="input"
                                       type="password"
                                       placeholder="Re-enter your new password"
                                       autocomplete="new-password" />
                                <button id="toggleConfirmPasswordBtn"
                                        class="password-toggle"
                                        type="button"
                                        aria-label="Show confirm password"
                                        aria-pressed="false">
                                    ??
                                </button>
                            </div>
                        </div>

                        <p class="password-hint">Password must be at least 8 characters.</p>

                        <div class="actions">
                            <button id="updateBtn" class="submit-btn" type="button">Update password</button>
                        </div>
                    </div>

                    <div id="msg"></div>
                    <div class="state-note" id="stateNote"></div>

                    <div class="back-row">
                        <button id="backToLoginBtn" class="back-link" type="button">Back to sign in</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { supabase } from "./supabaseClient.js";

        const newPasswordEl = document.getElementById("newPassword");
        const confirmPasswordEl = document.getElementById("confirmPassword");
        const updateBtn = document.getElementById("updateBtn");
        const backToLoginBtn = document.getElementById("backToLoginBtn");
        const msgEl = document.getElementById("msg");
        const loadingNoteEl = document.getElementById("loadingNote");
        const formBlockEl = document.getElementById("formBlock");
        const stateNoteEl = document.getElementById("stateNote");
        const toggleNewPasswordBtn = document.getElementById("toggleNewPasswordBtn");
        const toggleConfirmPasswordBtn = document.getElementById("toggleConfirmPasswordBtn");

        let resetSessionReady = false;

        function showMsg(text, isError = true) {
            msgEl.style.display = "block";
            msgEl.className = isError ? "msg-error" : "msg-success";
            msgEl.textContent = text;
        }

        function hideMsg() {
            msgEl.style.display = "none";
            msgEl.className = "";
            msgEl.textContent = "";
        }

        function setStateNote(text) {
            stateNoteEl.textContent = text || "";
        }

        function setFormVisible(visible) {
            formBlockEl.classList.toggle("is-hidden", !visible);
            loadingNoteEl.style.display = visible ? "none" : "inline-flex";
        }

        function validatePassword(password) {
            return String(password || "").length >= 8;
        }

        function getTokenHashFromPage() {
            const url = new URL(window.location.href);
            const tokenHash = url.searchParams.get("token_hash");
            return tokenHash ? tokenHash.trim() : "";
        }

        function getOtpTypeFromPage() {
            const url = new URL(window.location.href);
            const type = url.searchParams.get("type");
            return type ? type.trim() : "recovery";
        }

        function isForcedPasswordMode() {
            const url = new URL(window.location.href);
            return url.searchParams.get("mode") === "forced";
        }

        async function sessionRequiresForcedPasswordReset(session) {
            if (!session?.user?.id) return false;
            const { data, error } = await supabase
                .from("profiles")
                .select("force_password_reset")
                .eq("id", session.user.id)
                .maybeSingle();
            if (error) return isForcedPasswordMode();
            return data?.force_password_reset === true;
        }

        function cleanAuthParamsFromUrl() {
            const url = new URL(window.location.href);
            url.searchParams.delete("token_hash");
            url.searchParams.delete("type");
            url.searchParams.delete("mode");
            window.history.replaceState({}, document.title, url.pathname);
        }

        function setPasswordVisibility(inputEl, toggleBtn, visible, showLabel, hideLabel) {
            inputEl.type = visible ? "text" : "password";
            toggleBtn.setAttribute("aria-label", visible ? hideLabel : showLabel);
            toggleBtn.setAttribute("aria-pressed", visible ? "true" : "false");
            toggleBtn.textContent = visible ? "??" : "??";
        }

        async function verifyRecoveryLink() {
            hideMsg();

            const tokenHash = getTokenHashFromPage();
            const type = getOtpTypeFromPage();

            if (!tokenHash) {
                const { data: sessionData } = await supabase.auth.getSession();
                if (sessionData?.session?.user?.id && (isForcedPasswordMode() || await sessionRequiresForcedPasswordReset(sessionData.session))) {
                    resetSessionReady = true;
                    setFormVisible(true);
                    cleanAuthParamsFromUrl();
                    setStateNote("Set a new password to continue.");
                    return true;
                }
                setFormVisible(false);
                showMsg("Missing reset link data. Please request a new password reset email.", true);
                setStateNote("No token hash was found on this page.");
                return false;
            }

            try {
                const { error } = await supabase.auth.verifyOtp({
                    token_hash: tokenHash,
                    type
                });

                if (error) {
                    setFormVisible(false);
                    showMsg(error.message || "Reset link is invalid or expired.", true);
                    setStateNote("Please request a new reset email and use the latest link only once.");
                    return false;
                }

                resetSessionReady = true;
                setFormVisible(true);
                cleanAuthParamsFromUrl();
                setStateNote("Reset link verified. You can now set a new password.");
                return true;
            } catch (err) {
                setFormVisible(false);
                showMsg("Reset link is invalid. Please request a new password reset email.", true);
                setStateNote(String(err?.message || err || ""));
                return false;
            }
        }

        async function updatePassword() {
            hideMsg();

            if (!resetSessionReady) {
                showMsg("Reset session is not ready. Please reopen the latest reset link from your email.", true);
                return;
            }

            const newPassword = newPasswordEl.value || "";
            const confirmPassword = confirmPasswordEl.value || "";

            if (!newPassword || !confirmPassword) {
                showMsg("Please enter and confirm your new password.", true);
                return;
            }

            if (!validatePassword(newPassword)) {
                showMsg("Password must be at least 8 characters.", true);
                newPasswordEl.focus();
                return;
            }

            if (newPassword !== confirmPassword) {
                showMsg("Passwords do not match.", true);
                confirmPasswordEl.focus();
                return;
            }

            updateBtn.disabled = true;
            updateBtn.textContent = "Updating...";

            try {
                const { error } = await supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) {
                    showMsg(error.message || "Unable to update password.", true);
                    return;
                }

                const { data: sessionData } = await supabase.auth.getSession();
                const userId = sessionData?.session?.user?.id;
                if (userId) {
                    const { error: profileError } = await supabase
                        .from("profiles")
                        .update({ force_password_reset: false })
                        .eq("id", userId);
                    if (profileError && !String(profileError.message || "").includes("force_password_reset")) {
                        showMsg(profileError.message || "Password updated, but reset status could not be cleared.", true);
                        return;
                    }
                }

                showMsg("Password updated successfully. Redirecting to sign in...", false);
                setStateNote("");

                setTimeout(async () => {
                    await supabase.auth.signOut();
                    window.location.replace("./index.html?msg=password_updated");
                }, 1400);
            } finally {
                updateBtn.disabled = false;
                updateBtn.textContent = "Update password";
            }
        }

        await verifyRecoveryLink();

        toggleNewPasswordBtn?.addEventListener("click", () => {
            const isVisible = newPasswordEl.type === "text";
            setPasswordVisibility(
                newPasswordEl,
                toggleNewPasswordBtn,
                !isVisible,
                "Show new password",
                "Hide new password"
            );
        });

        toggleConfirmPasswordBtn?.addEventListener("click", () => {
            const isVisible = confirmPasswordEl.type === "text";
            setPasswordVisibility(
                confirmPasswordEl,
                toggleConfirmPasswordBtn,
                !isVisible,
                "Show confirm password",
                "Hide confirm password"
            );
        });

        updateBtn?.addEventListener("click", updatePassword);

        confirmPasswordEl?.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                updatePassword();
            }
        });

        backToLoginBtn?.addEventListener("click", () => {
            window.location.replace("./index.html");
        });

        setPasswordVisibility(
            newPasswordEl,
            toggleNewPasswordBtn,
            false,
            "Show new password",
            "Hide new password"
        );

        setPasswordVisibility(
            confirmPasswordEl,
            toggleConfirmPasswordBtn,
            false,
            "Show confirm password",
            "Hide confirm password"
        );
    </script>
</body>
</html>
