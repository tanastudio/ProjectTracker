<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:55321 https://vusgsdcozkaumyudqhlu.supabase.co; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self';" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Confirm Session - Mentis Project Hub</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: #0f172a;
      background: linear-gradient(180deg, #f8fafc 0%, #eef4ff 100%);
    }
    .card {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid rgba(15, 23, 42, .10);
      border-radius: 18px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .12);
      overflow: hidden;
    }
    .head {
      padding: 24px 28px;
      background: #0f172a;
      color: #fff;
    }
    .eyebrow {
      margin: 0 0 6px;
      color: #93c5fd;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }
    .body { padding: 28px; }
    .summary {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(59, 130, 246, .18);
      border-radius: 14px;
      background: #f8fbff;
      margin-bottom: 22px;
    }
    .row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 12px;
      font-size: 14px;
    }
    .label { color: #64748b; font-weight: 800; }
    .value { color: #0f172a; font-weight: 800; }
    .status-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 0 18px;
    }
    .option {
      border: 1px solid rgba(15, 23, 42, .14);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
      cursor: pointer;
      font-weight: 900;
      text-align: center;
    }
    .option input { display: none; }
    .option.selected {
      border-color: #2563eb;
      background: #eff6ff;
      color: #0b55d9;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid rgba(15, 23, 42, .14);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      margin: 8px 0 18px;
    }
    textarea:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }
    .actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 12px;
      min-height: 44px;
      padding: 0 18px;
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }
    .submit { background: #2563eb; color: #fff; }
    .submit:disabled { opacity: .55; cursor: not-allowed; }
    .muted { color: #64748b; font-size: 13px; font-weight: 700; }
    .message {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      display: none;
    }
    .message.ok { display: block; color: #047857; background: #ecfdf5; border: 1px solid #a7f3d0; }
    .message.err { display: block; color: #b91c1c; background: #fff1f2; border: 1px solid #fecdd3; }
    .loading { padding: 28px; color: #64748b; font-weight: 800; }
    @media (max-width: 640px) {
      body { padding: 16px; place-items: start center; }
      .head, .body { padding: 22px; }
      .row { grid-template-columns: 1fr; gap: 2px; }
      .status-options { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="card">
    <header class="head">
      <p class="eyebrow">Mentis Project Hub</p>
      <h1>Confirm session completion</h1>
    </header>
    <section id="app" class="loading">Loading confirmation link...</section>
  </main>

  <script type="module">
    import { SUPABASE_URL, SUPABASE_ANON_KEY } from "./js/config.js";

    const token = new URLSearchParams(window.location.search).get("token") || "";
    const app = document.getElementById("app");
    let selectedStatus = "completed";
    let details = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    async function callBookingNotify(body) {
      const response = await fetch(`${SUPABASE_URL}/functions/v1/booking-notify`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_ANON_KEY,
          "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
        },
        body: JSON.stringify(body),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data?.error || "Request failed");
      return data;
    }

    function setMessage(text, kind = "ok") {
      const node = document.getElementById("message");
      if (!node) return;
      node.className = `message ${kind}`;
      node.textContent = text;
    }

    function render() {
      const submitted = details?.sessionStatus && details.sessionStatus !== "pending";
      app.className = "body";
      app.innerHTML = `
        <div class="summary">
          <div class="row"><div class="label">Project</div><div class="value">${escapeHtml(details.projectName)}</div></div>
          <div class="row"><div class="label">Participant</div><div class="value">${escapeHtml(details.participantName)}</div></div>
          <div class="row"><div class="label">Step</div><div class="value">${escapeHtml(details.stepLabel)}</div></div>
          <div class="row"><div class="label">Date and time</div><div class="value">${escapeHtml(details.slotLabel)}</div></div>
          <div class="row"><div class="label">Current status</div><div class="value">${escapeHtml(details.sessionStatusLabel)}</div></div>
        </div>
        <div class="status-options">
          <label class="option ${selectedStatus === "completed" ? "selected" : ""}" data-option="completed">
            <input type="radio" name="sessionStatus" value="completed" ${selectedStatus === "completed" ? "checked" : ""} />
            Completed
          </label>
          <label class="option ${selectedStatus === "not_completed" ? "selected" : ""}" data-option="not_completed">
            <input type="radio" name="sessionStatus" value="not_completed" ${selectedStatus === "not_completed" ? "checked" : ""} />
            Not Complete
          </label>
        </div>
        <label class="label" for="comment">Comment</label>
        <textarea id="comment" maxlength="2000" placeholder="Add a short note for the project team...">${escapeHtml(details.sessionComment || "")}</textarea>
        <div class="actions">
          <button class="submit" id="submitBtn" type="button">Submit Confirmation</button>
          <span class="muted">${submitted ? "This session has already been submitted. You can update it while this link is valid." : "Your response updates the project immediately."}</span>
        </div>
        <div id="message" class="message"></div>
      `;

      document.querySelectorAll("[data-option]").forEach((node) => {
        node.addEventListener("click", () => {
          selectedStatus = node.getAttribute("data-option") || "completed";
          document.querySelectorAll("[data-option]").forEach((item) => item.classList.toggle("selected", item === node));
        });
      });

      document.getElementById("submitBtn").addEventListener("click", submit);
    }

    async function submit() {
      const btn = document.getElementById("submitBtn");
      btn.disabled = true;
      setMessage("Saving confirmation...", "ok");
      try {
        const result = await callBookingNotify({
          action: "submit_session_feedback",
          token,
          sessionStatus: selectedStatus,
          comment: document.getElementById("comment").value,
        });
        details = {
          ...details,
          sessionStatus: result.sessionStatus,
          sessionStatusLabel: result.sessionStatusLabel,
          sessionComment: result.sessionComment,
        };
        render();
        setMessage("Session confirmation submitted.", "ok");
      } catch (error) {
        setMessage(error.message || "Could not submit confirmation.", "err");
      } finally {
        const nextBtn = document.getElementById("submitBtn");
        if (nextBtn) nextBtn.disabled = false;
      }
    }

    async function init() {
      if (!token) {
        app.className = "body";
        app.innerHTML = `<div class="message err" style="display:block">This confirmation link is missing a token.</div>`;
        return;
      }
      try {
        details = await callBookingNotify({ action: "get_session_feedback", token });
        selectedStatus = details.sessionStatus === "not_completed" ? "not_completed" : "completed";
        render();
        document.querySelectorAll("[data-option]").forEach((node) => {
          node.classList.toggle("selected", node.getAttribute("data-option") === selectedStatus);
        });
      } catch (error) {
        app.className = "body";
        app.innerHTML = `<div class="message err" style="display:block">${escapeHtml(error.message || "This confirmation link is invalid or expired.")}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
